name: Lead Scraper Cloud
on:
  schedule:
    - cron: '0 13 * * *' # This is 9:00 AM EST (New York)
  workflow_dispatch: # This adds the "Run now" button
permissions:
  contents: write
jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Tools
        run: pip install requests python-dotenv beautifulsoup4
      - name: Run Bot
        env:
          YELP_API_KEY: ${{ secrets.YELP_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TARGET_LOCATIONS: "Austin TX, Houston TX, Dallas TX"
        run: |
          touch sent_leads.txt
          python yelp_lead_agent.py
      - name: Save Memory
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add sent_leads.txt
          git commit -m "Updated leads list" || echo "No new leads today"
          git push
